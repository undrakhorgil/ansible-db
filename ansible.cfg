[defaults]
inventory = inventory.yml
roles_path = roles
# Load custom callback plugins from this repo
callback_plugins = ./callback_plugins
# Newer ansible-core removed the old 'community.general.yaml' callback.
# Use built-in default callback with YAML formatting.
stdout_callback = clean
# Enable callback plugins (for profile_tasks, etc.)
bin_ansible_callbacks = True
# Show slow tasks with durations (helps troubleshooting)
callbacks_enabled = profile_tasks_strip,timer
# Keep logs readable
display_skipped_hosts = False
display_ok_hosts = True

# Prefer secure defaults; playbooks can still override via ansible_ssh_common_args
host_key_checking = True
retry_files_enabled = False
deprecation_warnings = False

[callback_default]
# Render results in YAML (instead of the legacy "pretty" dict format)
result_format = yaml
pretty_results = True
