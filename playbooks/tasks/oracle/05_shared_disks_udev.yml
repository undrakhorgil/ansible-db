---
- name: Create partition on shared ASM disks if needed
  ansible.builtin.shell: |
    set -euo pipefail
    d="{{ item }}"
    if [[ "$d" == *"/by-path/"* ]]; then
      part="${d}-part1"
    else
      part="${d}1"
    fi
    if [ ! -b "$part" ]; then
      echo -e "n\np\n1\n\n\nw" | fdisk "${d}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ asm_disks }}"

- name: Reread partition tables on ASM disks
  ansible.builtin.command: partprobe {{ item }}
  loop: "{{ asm_disks }}"
  changed_when: false
  failed_when: false

- name: Wipe stale ASM headers on CRS partitions (shared disks; primary node only)
  ansible.builtin.import_tasks: wipe_asm_partition_headers.yml

# udev SYMLINK+="oracleasm/..." cannot create /dev/oracleasm; missing dir => no symlinks (ls: no such file).
- name: Ensure /dev/oracleasm exists for ASM udev symlinks
  ansible.builtin.file:
    path: /dev/oracleasm
    state: directory
    mode: "0755"

- name: Persist /dev/oracleasm across reboot (tmpfs /dev)
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/oracle-asmdevices-dev.conf
    mode: "0644"
    content: |
      # Created by Ansible (oracle_restart / grid install step). Required before udev can create /dev/oracleasm/asm-*.
      d /dev/oracleasm 0755 root root -

- name: Write ASM udev rules
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-oracle-asmdevices.rules
    mode: "0644"
    content: |
      # ID_PATH: copy exact value from udevadm info -q property -n <partition-by-path> | grep ^ID_PATH=
      # Often equals the disk path (no -part1); DEVTYPE==partition avoids matching the whole disk.
      # Symlinks under /dev/oracleasm/ may show lrwxrwxrwx root:root — normal; verify OWNER on block:
      # ls -l /dev/disk/by-path/*-part1
      {% for s in asm_symlinks %}
      {% if s.id_path is defined %}
      ENV{ID_PATH}=="{{ s.id_path }}", ENV{DEVTYPE}=="partition", SUBSYSTEM=="block", SYMLINK+="oracleasm/{{ s.name }}", OWNER="{{ grid_user }}", GROUP="{{ asmadmin_group }}", MODE="0660"
      {% else %}
      KERNEL=="{{ s.device | regex_replace('^.*/', '') }}1", SUBSYSTEM=="block", SYMLINK+="oracleasm/{{ s.name }}", OWNER="{{ grid_user }}", GROUP="{{ asmadmin_group }}", MODE="0660"
      {% endif %}
      {% endfor %}

- name: Reload udev
  ansible.builtin.command: "{{ item }}"
  loop:
    - /sbin/udevadm control --reload-rules
    - /sbin/udevadm trigger --action=change
    - /sbin/udevadm settle
  changed_when: false

# Second pass: wipe the resolved block device behind /dev/oracleasm/* (same LUN as by-path -part1).
- name: Re-wipe ASM header on oracleasm symlink targets (post udev)
  ansible.builtin.shell: |
    set -euo pipefail
    sym="/dev/oracleasm/{{ s.name }}"
    if [ ! -e "$sym" ]; then
      echo "skip (no symlink yet): $sym"
      exit 0
    fi
    p=$(readlink -f "$sym")
    if [ ! -b "$p" ]; then
      echo "skip (not a block device): $sym -> $p"
      exit 0
    fi
    echo "Post-udev wipe $sym -> $p ({{ asm_wipe_header_mb | default(100) }} MiB)"
    dd if=/dev/zero of="$p" bs=1M count={{ asm_wipe_header_mb | default(100) }} conv=fsync
  args:
    executable: /bin/bash
  loop: "{{ asm_symlinks | default([]) }}"
  loop_control:
    loop_var: s
  when:
    - inventory_hostname == (groups['oracle_managed_hosts'] | default([]) | first)
    - asm_wipe_stale_headers | default(true)
    - _asm_dd_wipe_active | default(true) | bool
  become: true
