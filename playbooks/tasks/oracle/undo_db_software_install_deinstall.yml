---
- name: DB undo run deinstall if present
  become: true
  ansible.builtin.shell: |
    set -e
    runuser -u "{{ oracle_user }}" -- /bin/bash <<'EOSCRIPT'
    set -e
    D="{{ oracle_home }}/deinstall/deinstall"
    if [ -x "$D" ]; then
      "$D" -silent -home "{{ oracle_home }}" || true
    fi
    EOSCRIPT
  args:
    executable: /bin/bash
  when: inventory_hostname in (groups['oracle_managed_hosts'] | default([]))
  failed_when: false
  changed_when: true

- name: DB undo remove DB home directory (all RAC nodes)
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: absent
  when: inventory_hostname in (groups['oracle_managed_hosts'] | default([]))
  failed_when: false

- name: DB undo remove DB home from oraInventory XML (best effort)
  ansible.builtin.shell: |
    set -e
    INV="{{ oracle_inventory }}/ContentsXML/inventory.xml"
    if [ -f "$INV" ]; then
      sed -i '\|HOME NAME="OraDB26Home1" LOC="{{ oracle_home }}"|d' "$INV" || true
      sed -i '\|LOC="{{ oracle_home }}"|d' "$INV" || true
    fi
  args:
    executable: /bin/bash
  when: inventory_hostname in (groups['oracle_managed_hosts'] | default([]))
  failed_when: false
  changed_when: true
