---
# Step 11: unzip DB software into oracle_home.

- name: Ensure DB oracle_home directory exists (not created under ORACLE_BASE early — avoids INS-40109)
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == (groups['oracle_managed_hosts'] | default([]) | first)

# Root runs the module (writable ansible_remote_tmp); unzip runs as oracle (same pattern as step 16 / mount_asm).
- name: Unzip DB software into oracle_home
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    runuser -u "{{ oracle_user }}" -- /bin/bash <<'EOSCRIPT'
    set -euo pipefail
    unzip -oq "{{ oracle_db_software_zip }}" -d "{{ oracle_home }}"
    EOSCRIPT
  args:
    executable: /bin/bash
  when: inventory_hostname == (groups['oracle_managed_hosts'] | default([]) | first)

