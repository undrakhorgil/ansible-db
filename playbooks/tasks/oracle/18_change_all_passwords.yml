---
# Step 18: change OS passwords for root, oracle, and grid.

- name: Change root/oracle/grid OS passwords
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | password_hash('sha512') }}"
    update_password: always
  loop:
    - { name: "root", password: "{{ root_user_password_new }}" }
    - { name: "{{ oracle_user }}", password: "{{ oracle_user_password_new }}" }
    - { name: "{{ grid_user }}", password: "{{ grid_user_password_new }}" }

