---
- import_playbook: bootstrap_inventory.yml
- import_playbook: prep_remote.yml

- name: Run one step
  hosts: oracle_managed_hosts
  gather_facts: false
  become: true
  any_errors_fatal: true
  vars_files:
    - vars/oracle_defaults.yml
  vars:
    ansible_user: root
    ansible_password: "{{ target_root_password }}"
    ansible_ssh_common_args: >-
      {{ '' if (oracle_ssh_strict_host_key_checking | default(true) | bool)
         else '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' }}
    ansible_python_interpreter: /usr/bin/python3.11
  tasks:
    - name: Validate oracle_step
      ansible.builtin.assert:
        that:
          - oracle_step is defined
          - oracle_step | length > 0
        quiet: true
    # Partial runs skip main.yml; topology facts (rac_*) are required by many task files.
    - name: Load topology from oracle_hosts
      ansible.builtin.import_tasks: tasks/oracle/00_topology_from_oracle_hosts.yml
    - name: Run selected step
      ansible.builtin.include_tasks: tasks/oracle/{{ oracle_step }}
