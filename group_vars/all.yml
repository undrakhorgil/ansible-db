---
# Credentials
target_root_password: "Welcome1"

# Ansible remote temp (~/.ansible under oracle/grid often unusable). Step 16 / mount_asm use runuser so modules stay root;
# if you add become_user: grid|oracle shell tasks, ensure this dir is writable by that user or use the same runuser pattern.
ansible_remote_tmp: /tmp/.ansible-tmp

# Single host: host_ip is the SSH/reachable address and Ansible inventory name.
# Oracle Grid/DB use the server's real short hostname (ansible_hostname), e.g. host03 — no need to duplicate it here.
oracle_hosts:
  - host_ip: 192.168.1.132

# Public subnet for Grid networkInterfaceList (network address, not CIDR; must match netmask on the host).
oracle_public_subnet: 192.168.1.0
# Used in /etc/hosts so hostname -f resolves; must match `hostname -f` domain on the server.
oracle_hosts_domain: localdomain

# Oracle homes/users (26ai)
# grid_home = GI 26ai; oracle_home = DB 26ai. Each has its own OUI entry — GI being 26 does not fix a DB home that is
# still registered as 23. For oracle_home, oraversion -majorVersion / -baseVersion must show 26.x (same catalog DBCA uses).
# If the path is .../26.0.0/... but oraversion shows 23.x, fix the DB home registration (detach/attach or reinstall DB
# software), not Grid. Step 16 fails fast until DB catalog matches 26ai.
oracle_base: /u01/app/oracle
oracle_inventory: /u01/app/oraInventory
grid_home: /u01/app/26.0.0/grid
oracle_home: /u01/app/oracle/product/26.0.0/dbhome_1
oracle_user: oracle
grid_user: grid
oinstall_group: oinstall
dba_group: dba
asmadmin_group: asmadmin
asmdba_group: asmdba
asmoper_group: asmoper

# Software zips (remote paths on target). The *230000* zips are 23c — oraversion will be 23.x.
# oracle_home uses …/26.0.0/… while software is 23c — path major ≠ oraversion; step 16 allows that when
# dbca_enforce_oracle_home_path_matches_oraversion is false (still fails if inventory.xml disagrees with oraversion).
# Alternative: 26ai DB zip + …/26.0.0/… path, or 23c zip + …/23.0.0/… path with matching folders/install.
oracle_grid_software_zip: /tmp/p38753741_230000_Linux-x86-64.zip
oracle_db_software_zip: /tmp/p38743961_230000_Linux-x86-64.zip
oracle_preinstall_package: oracle-ai-database-preinstall-26ai

# Shared ASM disks — stable /dev/disk/by-path/ whole-disk paths (no -part1) for partitioning.
asm_disks:
  - /dev/disk/by-path/pci-0000:00:14.0-scsi-0:0:0:0
  - /dev/disk/by-path/pci-0000:00:14.0-scsi-0:0:1:0

asm_symlinks:
  - { id_path: "pci-0000:00:14.0-scsi-0:0:0:0", name: asm-crs-disk1 }
  - { id_path: "pci-0000:00:14.0-scsi-0:0:1:0", name: asm-crs-disk2 }

# ASM disk groups (DATA/FRA/custom). SYSASM SID is +ASM for Restart.
asm_diskgroups:
  - name: DATA
    used_for_grid_crs: true
    redundancy: EXTERNAL
    disks: [/dev/oracleasm/asm-crs-disk1]
  - name: FRA
    used_for_grid_crs: false
    redundancy: EXTERNAL
    disks: [/dev/oracleasm/asm-crs-disk2]

# gridSetup ASM discovery
grid_asm_disk_discovery_string: "/dev/oracleasm/*"
grid_asm_disk_list: ""
grid_asm_diskgroup_redundancy: EXTERNAL
asm_wipe_stale_headers: true
# Increase if headers persist; useless while disk is still in a DG — run undo 15 / drop FRA and stop HAS first.
asm_wipe_header_mb: 100

# Passwords
sys_password: "Welcome1"
root_user_password_old: "Welcome1"
oracle_user_password_old: "Welcome1"
grid_user_password_old: "Welcome1"

root_user_password_new: "Welcome1"
oracle_user_password_new: "Welcome1"
grid_user_password_new: "Welcome1"

# Grid silent install
oracle_cluvfy_extra_args: ""
oracle_grid_silent_use_bundled_response_file: true
oracle_grid_rootconfig_executeRootScript: false

# Output
oracle_show_cmd_output: false

# oradbctl step 16 — DBCA (single-instance on ASM); task file 16_create_orcl_database.yml
# Skip entire oraversion/path preflight (debug only).
dbca_skip_db_home_inventory_mismatch_check: false
# false = allow 23c oraversion under a …/product/26…/ path (this lab). true = path major must match oraversion.
dbca_enforce_oracle_home_path_matches_oraversion: false
dbca_gdbname: ORCL
dbca_sid: ORCL
dbca_pdb_name: ORCLPDB
dbca_character_set: AL32UTF8
dbca_sys_password: "Welcome1"
dbca_system_password: "Welcome1"
dbca_db_snmp_password: "Welcome1"
dbca_pdb_admin_password: "Welcome1"
dbca_data_diskgroup: DATA
dbca_recovery_diskgroup: FRA
dbca_recovery_area_size_mb: 20480
# Explicit db_create_file_dest / db_recovery_file_dest in -initParams — helps some RMAN seed-clone restores on ASM.
dbca_pass_init_params: true
dbca_ignore_prereq_checks: true
dbca_asm_min_free_mb_data: 4096
dbca_asm_min_free_mb_fra: 4096
dbca_drop_existing_before_create: true
undo_20_remove_asm_paths: true
undo_20_clean_local_files: true
undo_20_clean_oratab: true
dbca_undo_timeout_seconds: 3600
